name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: PDF切割线工具-windows
            ext: .exe
          - os: macos-latest
            artifact: PDF切割线工具-macos
            ext: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build
        run: |
          pyinstaller --onefile --windowed --name "PDF切割线工具" --collect-all pikepdf --collect-all pymupdf cut_tool.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Package
        run: |
          cd artifacts
          for d in */; do
            zip -r "${d%/}.zip" "$d"
          done
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
